<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Customer Portal | Realtime Service</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Font Awesome -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

<style>
body {
    background: radial-gradient(circle at 10% 20%, rgba(15,25,45,0.98), #0a0f1e);
    display:flex;align-items:center;justify-content:center;
    min-height:100vh;margin:0;padding:20px;
}
.login-card {
    max-width:480px;width:100%;
    background:rgba(20,30,50,0.7);
    backdrop-filter:blur(16px);
    border-radius:30px;padding:35px;
    border:1px solid rgba(255,255,255,0.2);
}
.brand{text-align:center;margin-bottom:25px;}
.brand h2{color:#fff;}
.form-control{
    background:rgba(0,0,0,0.5);
    border-radius:25px;color:#fff;
}
.btn-login{
    background:#ff7b2c;border:none;
    border-radius:30px;color:#fff;
    padding:12px;width:100%;
}
.toast-container{position:fixed;bottom:20px;right:20px;}
.customer-dashboard{max-width:1000px;width:100%;}
.stat-card{
    background:rgba(255,255,255,0.05);
    padding:15px;border-radius:15px;
}
</style>
</head>

<body>
<div id="appRoot"></div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxAtwwPznCDLyF47g96jKAG3IDRuXkMjPkGMkILwfnhaBohxOgPJJ-L2Y4HO1Hrl_2myQ/exec";

let currentCustomer = null;
let customerPolicies = [];

async function callAPI(path, method, params = {}) {
    try {
        const url = new URL(APPS_SCRIPT_URL);
        url.searchParams.append('path', path);
        url.searchParams.append('method', method);

        for (let key in params) {
            url.searchParams.append(key, params[key]);
        }

        const res = await fetch(url);
        let data;

        try {
            data = await res.json();
        } catch {
            throw new Error("Invalid server response");
        }

        if (!res.ok) throw new Error("Network error");
        if (data.error) throw new Error(data.error);

        return data;
    } catch (err) {
        throw new Error(err.message);
    }
}

function showToast(message, type='success'){
    const map = {
        success:'bg-success',
        danger:'bg-danger',
        info:'bg-info'
    };

    let container=document.querySelector('.toast-container');
    if(!container){
        container=document.createElement('div');
        container.className='toast-container';
        document.body.appendChild(container);
    }

    const el=document.createElement('div');
    el.className=`toast text-white ${map[type]}`;
    el.innerHTML=`
    <div class="d-flex">
        <div class="toast-body">${message}</div>
        <button class="btn-close btn-close-white" data-bs-dismiss="toast"></button>
    </div>`;

    container.appendChild(el);
    new bootstrap.Toast(el,{delay:3000}).show();
}

function renderLogin(){
    document.getElementById('appRoot').innerHTML=`
    <div class="login-card">
        <div class="brand">
            <h2>Customer Portal</h2>
        </div>
        <form id="loginForm">
            <input type="tel" id="mobile" class="form-control mb-3" placeholder="Mobile" required>
            <input type="text" id="policy" class="form-control mb-3" placeholder="Policy Number" required>
            <button class="btn-login">Login</button>
        </form>
    </div>
    `;

    document.getElementById('loginForm').addEventListener('submit', handleLogin);
}

async function handleLogin(e){
    e.preventDefault();

    const mobile=document.getElementById('mobile').value.trim();
    const policy=document.getElementById('policy').value.trim();

    if(!/^[0-9]{10}$/.test(mobile)){
        showToast("Invalid mobile number","danger");
        return;
    }

    try{
        const cust=await callAPI('customers','GET');
        const pol=await callAPI('policies','GET');

        const customer=cust.customers.find(c=>c.mobile==mobile);
        if(!customer) throw new Error("User not found");

        const match=pol.policies.find(p=>p.policy_number==policy && p.customer_id==customer.id);
        if(!match) throw new Error("Policy not found");

        currentCustomer=customer;
        customerPolicies=pol.policies.filter(p=>p.customer_id==customer.id);

        renderDashboard();

    }catch(err){
        showToast(err.message,"danger");
    }
}

function renderDashboard(){
    document.getElementById('appRoot').innerHTML=`
    <div class="customer-dashboard">
        <h3 class="text-white mb-3">Welcome ${currentCustomer.name}</h3>

        <div class="row mb-3">
            <div class="col-md-3"><div class="stat-card text-white">Total: ${customerPolicies.length}</div></div>
        </div>

        <table class="table table-dark">
            <thead>
                <tr><th>Policy</th><th>Expiry</th></tr>
            </thead>
            <tbody>
                ${customerPolicies.map(p=>`
                    <tr>
                        <td>${p.policy_number}</td>
                        <td>${p.expiry_date}</td>
                    </tr>
                `).join('')}
            </tbody>
        </table>

        <button onclick="logout()" class="btn btn-warning">Logout</button>
    </div>
    `;
}

function logout(){
    currentCustomer=null;
    customerPolicies=[];
    renderLogin();
}

renderLogin();
</script>

</body>
</html>
